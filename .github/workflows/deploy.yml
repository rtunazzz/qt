name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deploy directory
        run: |
          mkdir -p dist
          cp -r index.html favicon.svg sw.js _headers static settings assets SKILL.md dist/
          cat static/redirect-data.js worker.js > dist/_worker.js
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.76.0"
          command: pages deploy dist --project-name=qt --branch=main --commit-dirty=true
