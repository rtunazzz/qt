<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qt — personalized crypto link shortcuts</title>
  <meta name="description" content="Turn long crypto URLs into short, personalized redirects. Configure your preferred trading platforms, charting tools, and block explorers. Privacy-focused — all data stored locally.">
  <meta name="theme-color" content="#050505">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://qt.rtuna.dev">
  <meta property="og:title" content="qt — personalized crypto link shortcuts">
  <meta property="og:description" content="Short redirects to your preferred trading, charting, and explorer platforms. No accounts, no tracking — all preferences stored in your browser.">
  <meta property="og:image" content="https://qt.rtuna.dev/assets/og.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="qt — personalized crypto link shortcuts">
  <meta name="twitter:description" content="Short redirects to your preferred trading, charting, and explorer platforms.">
  <meta name="twitter:image" content="https://qt.rtuna.dev/assets/og.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <header class="header" style="--i:0">
      <div class="logo">
        <span class="logo-mark">qt</span>
        <span class="logo-divider">/</span>
        <span class="logo-sub">settings</span>
      </div>
      <p class="tagline">Configure redirect preferences.<br>All data stored locally via cookies.</p>
    </header>

    <form id="settings-form">
      <div class="eco-grid">
        <section class="card" style="--i:1">
          <div class="card-header">
            <h2>Solana</h2>
            <span class="badge sol">SOL</span>
          </div>
          <div class="field">
            <label for="sol-trade">Trading</label>
            <div class="select-wrap">
              <select id="sol-trade" name="sol-trade"></select>
            </div>
          </div>
          <div class="field">
            <label for="sol-chart">Charting</label>
            <div class="select-wrap">
              <select id="sol-chart" name="sol-chart"></select>
            </div>
          </div>
          <div class="field">
            <label for="sol-explore">Explorer</label>
            <div class="select-wrap">
              <select id="sol-explore" name="sol-explore"></select>
            </div>
          </div>
        </section>

        <section class="card" style="--i:2">
          <div class="card-header">
            <h2>EVM</h2>
            <span class="badge evm">ETH</span>
          </div>
          <div class="field">
            <label for="evm-trade">Trading</label>
            <div class="select-wrap">
              <select id="evm-trade" name="evm-trade"></select>
            </div>
          </div>
          <div class="field">
            <label for="evm-chart">Charting</label>
            <div class="select-wrap">
              <select id="evm-chart" name="evm-chart"></select>
            </div>
          </div>
          <div class="field">
            <label for="evm-explore">Explorer</label>
            <div class="select-wrap">
              <select id="evm-explore" name="evm-explore"></select>
            </div>
          </div>
        </section>
      </div>

      <section class="card card-accent" style="--i:3">
        <div class="card-header">
          <h2>Overrides</h2>
          <span class="badge">per-chain</span>
        </div>
        <p class="hint">Override ecosystem defaults for a specific chain</p>

        <div id="overrides-list"></div>

        <div class="add-override" id="add-override">
          <div class="add-override-row">
            <div class="select-wrap">
              <select id="add-chain">
                <option value="">Chain...</option>
              </select>
            </div>
            <div class="select-wrap">
              <select id="add-action" disabled>
                <option value="">Action...</option>
              </select>
            </div>
            <div class="select-wrap">
              <select id="add-platform" disabled>
                <option value="">Platform...</option>
              </select>
            </div>
            <button type="button" class="add-btn" id="add-btn" disabled>+</button>
          </div>
        </div>
      </section>

    </form>

    <footer class="footer" style="--i:4">
      <div class="footer-routes" id="footer-routes"></div>
    </footer>
  </div>

  <script src="/static/config.js"></script>
  <script src="/static/settings.js"></script>
</body>
</html>
