<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qt — Settings</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>qt <span class="subtitle">settings</span></h1>
    <p class="description">Configure your default trading, charting, and explorer platforms. Preferences are saved locally in your browser.</p>

    <form id="settings-form">
      <section>
        <h2>Default Action</h2>
        <p class="hint">When visiting /{chain}/{token} without specifying an action</p>
        <div class="field">
          <label for="default-action">Action</label>
          <select id="default-action" name="default-action">
            <option value="trade">Trade</option>
            <option value="chart">Chart</option>
            <option value="explore">Explore</option>
          </select>
        </div>
      </section>

      <section>
        <h2>Solana Defaults</h2>
        <div class="field">
          <label for="sol-trade">Trading</label>
          <select id="sol-trade" name="sol-trade"></select>
        </div>
        <div class="field">
          <label for="sol-chart">Charting</label>
          <select id="sol-chart" name="sol-chart"></select>
        </div>
        <div class="field">
          <label for="sol-explore">Explorer</label>
          <select id="sol-explore" name="sol-explore"></select>
        </div>
      </section>

      <section>
        <h2>EVM Defaults</h2>
        <div class="field">
          <label for="evm-trade">Trading</label>
          <select id="evm-trade" name="evm-trade"></select>
        </div>
        <div class="field">
          <label for="evm-chart">Charting</label>
          <select id="evm-chart" name="evm-chart"></select>
        </div>
        <div class="field">
          <label for="evm-explore">Explorer</label>
          <select id="evm-explore" name="evm-explore"></select>
        </div>
      </section>

      <section>
        <h2>Chain Overrides</h2>
        <p class="hint">Override ecosystem defaults for specific chains</p>
        <div id="overrides"></div>
      </section>

      <button type="submit">Save</button>
    </form>
  </div>

  <script src="/static/config.js"></script>
  <script src="/static/settings.js"></script>
</body>
</html>
